name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore + build (app WinUI)
        run: dotnet build ZiaMonitoring.App.csproj -c Release -p:Platform=x64

      - name: Build (bootstrapper installeur)
        run: dotnet build installer/bootstrapper/ZiaMonitoring.SetupBootstrapper.csproj -c Release

      - name: Tests unitaires
        run: dotnet test tests/ZiaMonitoring.Tests/ZiaMonitoring.Tests.csproj -c Release --logger "trx;LogFileName=results.trx"

      - name: Publier les résultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/ZiaMonitoring.Tests/TestResults/*.trx
          if-no-files-found: ignore
